<main class="main">
  @if (isLoading()) {
    <div class="loading-state">
      <span class="spinner spinner--large"></span>
      <p>Loading portfolio...</p>
    </div>
  } @else if (loadError()) {
    <div class="error-state">
      <p class="error-state__msg">{{ loadError() }}</p>
      <button class="refresh-button" (click)="refreshData()">Retry</button>
    </div>
  } @else {
    <app-portfolio-summary
      [isRefreshing]="isRefreshing()"
      [summary]="portfolioData().summary"
      (onAddItem)="showAddModal.set(true)"
      (onRefreshData)="refreshData()" />
    <div class="content">
      <div class="content__toolbar">
        <button class="view-toggle" (click)="groupByType.set(!groupByType())">
          {{ groupByType() ? 'Simple View' : 'Group View' }}
        </button>
        <button class="view-toggle" (click)="exportCsv()">Export CSV</button>
        <button class="view-toggle" (click)="exportJson()">Export JSON</button>
        <button class="view-toggle" (click)="importJson()">Import JSON</button>
      </div>
      <div class="content__table-wrapper">
        <app-shares-table
          [data]="portfolioData().items"
          [groupByType]="groupByType()"
          (portfolioUpdated)="onPortfolioUpdated($event)" />
      </div>
    </div>
  }
</main>

@if (showAddModal()) {
  <app-add-item-modal (close)="showAddModal.set(false)" (itemSubmit)="addItem($event)" />
}

<router-outlet />

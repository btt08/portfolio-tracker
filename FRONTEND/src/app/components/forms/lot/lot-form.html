<div class="add-lot-form">
  <div class="form-fields">
    <label>
      Date
      <input type="date" [formField]="lotForm.createdDate" />
    </label>
    <label>
      Qty
      <input type="number" [formField]="lotForm.qtyRemaining" step="any" />
    </label>
    <label>
      Cost/Unit
      <input type="number" [formField]="lotForm.costPerUnit" step="any" />
    </label>
    <label>
      Commission
      <input type="number" [formField]="lotForm.commission" step="any" />
    </label>
    <label>
      Currency
      <select [formField]="lotForm.currency">
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
        <option value="USD">USD</option>
        <option value="CHF">CHF</option>
      </select>
    </label>
    @if (isNonEur()) {
      <label>
        Exchange Rate
        <input type="number" [formField]="lotForm.exchangeRate" step="any" />
      </label>
    }
    <label>
      Total Cost
      <input type="text" [value]="totalCost() | number: '1.2-2' : 'de-DE'" disabled />
    </label>
    <button class="form-btn" (click)="submit()" [disabled]="!isValid() || submitting()">
      {{ submitting() ? 'Adding...' : 'Add' }}
    </button>
  </div>
</div>

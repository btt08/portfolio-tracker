<div class="sell-form">
  <div class="form-fields">
    <label class="form-label">
      Qty to sell
      <input type="number" [formField]="sellForm.qtyToSell" step="any" />
    </label>
    <label class="form-label">
      Sell price
      <input type="number" [formField]="sellForm.sellPrice" step="any" />
    </label>
    <label class="form-label">
      Commission
      <input type="number" [formField]="sellForm.commission" step="any" />
    </label>
    <button
      class="form-btn sell-btn"
      (click)="submit()"
      [disabled]="!isValid() || submitting()">
      {{ submitting() ? 'Selling...' : 'Sell' }}
    </button>
  </div>
  @if (error()) {
    <span class="sell-error">{{ error() }}</span>
  }
</div>
